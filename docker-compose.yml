services:
  webremote:
    build: .
    container_name: webremote-app
    restart: unless-stopped
    environment:
      - WEBREMOTE_USER=${WEBREMOTE_USER:-admin}
      - WEBREMOTE_PASS=${WEBREMOTE_PASS:-webremote}
      - SECRET_KEY=${SECRET_KEY:-webremote-change-me-in-production}
    volumes:
      - ./data:/app/data
    networks:
      - webremote-net

  nginx:
    image: nginx:alpine
    container_name: webremote-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webremote
    networks:
      - webremote-net

networks:
  webremote-net:
    driver: bridge
